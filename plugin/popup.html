<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>小星设置</title>
    <style>
      body {
        width: 300px;
        padding: 14px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #0b0b0b;
        color: #f5f5f5;
      }
      h2 {
        margin-top: 0;
        color: #f5f5f5;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      .status-card {
        background: #151515;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid #2a2a2a;
        margin-bottom: 16px;
      }
      .status-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 12px;
        color: #8a8a8a;
      }
      .status-value {
        font-weight: 800;
        color: #f5f5f5;
      }
      .status-ok {
        color: #22c55e;
      }
      .status-error {
        color: #ef4444;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #3b82f6;
        color: white;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 800;
        transition:
          transform 0.12s ease,
          background 0.12s ease;
      }
      button:hover {
        background-color: #2563eb;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <h2>小星设置</h2>

    <div class="status-card">
      <div class="status-item">
        <span>后端状态:</span>
        <span id="backend-status" class="status-value">Checking...</span>
      </div>
      <div class="status-item">
        <span>API 版本:</span>
        <span id="api-version" class="status-value">-</span>
      </div>
    </div>

    <button id="refresh-btn">刷新状态</button>

    <script src="popup.js"></script>
  </body>
</html>
